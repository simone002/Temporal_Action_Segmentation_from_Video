data:
  egtea_root:     "D:/egtea"
  annotation_dir: "./action_annotation"
  split:          1
  use_flow:       false
  batch_size:     8
  seq_len:        256
  feat_dim:       1024
  num_workers:    0

model:
  name:        "cnn1d"
  feat_dim:    1024
  num_classes: 106
  hidden:      512
  n_layers:    4

training:
  lr:              0.0003
  weight_decay:    0.0001
  label_smoothing: 0.1
  max_epochs:      100

wandb:
  project: "temporal-action-segmentation"
  name:    "cnn1d-final"